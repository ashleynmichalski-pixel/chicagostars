<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A1520"/>
  <!-- Subtle vignette border -->
  <rect width="1200" height="630" fill="url(#vignette)"/>
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1B2E45" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0A1520" stop-opacity="0.8"/>
    </radialGradient>
  </defs>

  <!-- Star logo centered at 600, 220, scaled to ~160px -->
  <g transform="translate(600,220) scale(1.6)">
    <polygon points="0,-75 17,-32 63,-32 27,8 41,55 0,28 -41,55 -27,8 -63,-32 -17,-32" fill="#5BB8D4" opacity="0.9"/>
    <polygon points="0,-60 12,-22 42,-22 18,0 27,36 0,18 -27,36 -18,0 -42,-22 -12,-22" fill="#1B2E45"/>
    <polygon points="0,-48 9,-15 31,-15 12,0 20,27 0,14 -20,27 -12,0 -31,-15 -9,-15" fill="#C8102E" opacity="0.9"/>
  </g>

  <!-- INTENTSCORE title -->
  <text x="600" y="390" font-family="Arial Black, Arial, sans-serif" font-size="88" font-weight="900" text-anchor="middle" letter-spacing="6" fill="#F5F5F5">INTENT</text>
  <text x="600" y="390" font-family="Arial Black, Arial, sans-serif" font-size="88" font-weight="900" text-anchor="middle" letter-spacing="6" fill="none">
    <tspan fill="#F5F5F5">INTENT</tspan><tspan fill="#5BB8D4">SCORE</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="448" font-family="Arial, sans-serif" font-size="22" font-weight="400" text-anchor="middle" letter-spacing="8" fill="#8AA0B4">CHICAGO STARS FC</text>

  <!-- Thin divider line -->
  <line x1="460" y1="468" x2="740" y2="468" stroke="#243C58" stroke-width="1"/>

  <!-- Tagline -->
  <text x="600" y="504" font-family="Arial, sans-serif" font-size="16" font-weight="300" text-anchor="middle" letter-spacing="3" fill="#4A6580">WEEKLY INTENTIONALITY CHECK-IN</text>
</svg>
